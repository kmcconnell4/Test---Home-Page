<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f4a9e, #6b2fa0);
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      text-align: center;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 3rem 4rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 5%;
      border: 4px solid white;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.75rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .welcome-msg {
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    .contact-btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #1a6fe8;
      background: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, color 0.3s ease;
    }

    .contact-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      background: #1a6fe8;
      color: white;
    }

    .contact-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Photos/Winkeler_Kirsten.jpg" alt="Profile photo" class="profile-photo">
    <h1>Hello World!</h1>
    <p class="welcome-msg">Welcome to my page! Thanks for stopping by.</p>
    <a href="mailto:contact@example.com" class="contact-btn">Contact me</a>
  </div>
</body>
</html>
