<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <link rel="icon" type="image/x-icon" href="Photos/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="page-wrapper">
    <div class="container">
    <div class="profile-photo-wrapper">
      <img src="Photos/Winkeler_Kirsten.jpg" alt="Profile photo" class="profile-photo" onclick="showProfileBubble()">
      <div class="profile-bubble" id="profile-bubble"></div>
    </div>
    <h1>Hello World!</h1>
    <p class="welcome-msg">Welcome to my page! Thanks for stopping by.</p>
    <button class="contact-btn" onclick="launchConfetti(event); toggleRoni();">Contact me</button>
  </div>

  <!-- Weather Widget -->
  <div id="weather-widget" class="weather-widget">

    <!-- Loading State -->
    <div id="weather-loading" class="weather-loading">
      Loading weather...
    </div>

    <!-- Error State -->
    <div id="weather-error" class="weather-error" style="display:none;">
      ⚠️ Weather unavailable. Please try again later.
    </div>

    <!-- Weather Content -->
    <div id="weather-content" class="weather-content" style="display:none;">

      <!-- Header: Location + Buttons -->
      <div class="weather-header">
        <h3 id="weather-location" class="weather-location">--</h3>
        <div class="weather-controls">
          <button id="weather-locate-btn" class="weather-btn">
            📍 Current Location
          </button>
          <div class="unit-toggle" id="weather-unit-btn">
            <span class="unit-option unit-active" data-unit="fahrenheit">°F</span>
            <span class="unit-option" data-unit="celsius">°C</span>
          </div>
        </div>
      </div>

      <!-- Current Conditions -->
      <div class="weather-main">
        <span id="weather-icon" class="weather-icon"></span>
        <span id="weather-temp" class="weather-temp"></span>
      </div>
      <p id="weather-condition" class="weather-condition"></p>
      <div class="weather-details">
        <span id="weather-humidity">💧 --%</span>
        <span id="weather-wind">💨 -- mph</span>
      </div>

      <!-- Divider -->
      <hr class="weather-divider" />

      <!-- 5-Day Forecast -->
      <div class="weather-forecast-header">5-Day Forecast</div>
      <div id="weather-forecast" class="weather-forecast"></div>

      <!-- Last Updated Timestamp -->
      <p id="weather-updated" class="weather-updated"></p>

    </div>
  </div>
  </div>

  <div class="roni-popup" id="roni-popup" onclick="toggleRoni()">
    <div class="speech-bubble">BORK! BORK!</div>
    <img src="Photos/roni.jpeg" alt="Roni">
  </div>
  <canvas id="confetti-canvas"></canvas>
  <script>
    // Profile bubble phrases — add your phrases here!
    const profilePhrases = [
      'Look at my cutie tootie lil Protogen test site!',
      'No hard pants 👖🙅🏼‍♀️',
      'That\'s a big honka chonk!',
      'I\'m a little crusty today'
    ];
    let profileBubbleTimeout = null;

    function showProfileBubble() {
      const bubble = document.getElementById('profile-bubble');
      const phrase = profilePhrases[Math.floor(Math.random() * profilePhrases.length)];
      bubble.textContent = phrase;

      // Reset animation
      bubble.classList.remove('visible');
      clearTimeout(profileBubbleTimeout);
      requestAnimationFrame(() => {
        bubble.classList.add('visible');
        profileBubbleTimeout = setTimeout(() => {
          bubble.classList.remove('visible');
        }, 3000);
      });
    }

    function toggleRoni() {
      const popup = document.getElementById('roni-popup');
      if (popup.classList.contains('visible')) {
        popup.classList.remove('visible');
      } else {
        popup.classList.add('visible');
        popup.animate([
          { right: '-500px' },
          { right: '20px', offset: 0.4 },
          { right: '50px', offset: 0.5 },
          { right: '20px', offset: 0.6 },
          { right: '40px', offset: 0.7 },
          { right: '20px', offset: 0.8 },
          { right: '30px', offset: 0.9 },
          { right: '20px' }
        ], { duration: 1200, easing: 'ease' });
      }
    }

    const canvas = document.getElementById('confetti-canvas');

    // Generate star field
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
      star.style.setProperty('--delay', (Math.random() * 5) + 's');
      starsContainer.appendChild(star);
    }

    const ctx = canvas.getContext('2d');
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
    let particles = [];
    let animating = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const colors = ['#c97070','#c9a070','#c9c970','#70a870','#7090c9','#9070c9','#e8a0b8','#70c9c0'];

    function launchConfetti(e) {
      const rect = e.target.getBoundingClientRect();
      const originX = rect.left + rect.width / 2;
      const originY = rect.top + rect.height / 2;

      for (let i = 0; i < 120; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 8;
        particles.push({
          x: originX,
          y: originY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 4,
          size: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 12,
          life: 1,
          decay: 0.008 + Math.random() * 0.008
        });
      }
      if (!animating) {
        animating = true;
        animateConfetti();
      }
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.vx *= 0.99;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      });

      particles = particles.filter(p => p.life > 0);

      if (particles.length > 0) {
        requestAnimationFrame(animateConfetti);
      } else {
        animating = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
  </script>
  <script src="weather.js"></script>
</body>
</html>
