<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes ripple-bg {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f4a9e, #3a2fa0, #6b2fa0, #4a1a8e, #0f4a9e);
      background-size: 400% 400%;
      animation: ripple-bg 12s ease infinite;
      font-family: 'Segoe UI', sans-serif;
    }

    .page-wrapper {
      display: flex;
      align-items: stretch;
      gap: 2rem;
      position: relative;
      z-index: 1;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--duration) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 3rem 4rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 5%;
      border: 4px solid white;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.75rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .welcome-msg {
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    @keyframes rainbow-throb {
      0%   { background-position: 0% 50%;   transform: translateY(-3px) scale(1.05); }
      50%  { background-position: 100% 50%; transform: translateY(-3px) scale(1.1); }
      100% { background-position: 0% 50%;   transform: translateY(-3px) scale(1.05); }
    }

    .contact-btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #1a6fe8;
      background: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, color 0.3s ease;
    }

    .contact-btn:hover {
      background: linear-gradient(270deg, #c97070, #c9a070, #c9c970, #70a870, #7090c9, #9070c9, #c97070);
      background-size: 600% 600%;
      color: white;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      animation: rainbow-throb 2s ease infinite;
    }

    .contact-btn:active {
      transform: translateY(0);
    }

    .profile-photo {
      cursor: pointer;
    }

    @keyframes bounce-in {
      0%   { right: -500px; }
      40%  { right: 20px; }
      50%  { right: 50px; }
      60%  { right: 20px; }
      70%  { right: 40px; }
      80%  { right: 20px; }
      90%  { right: 30px; }
      100% { right: 20px; }
    }

    .roni-popup {
      position: fixed;
      right: -500px;
      bottom: 20px;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      gap: 0;
      transition: right 1s ease-in-out;
    }

    .roni-popup.visible {
      right: 20px;
    }

    .roni-popup img {
      width: 200px;
      height: 200px;
      border-radius: 16px;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .speech-bubble {
      position: relative;
      background: white;
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      margin-right: -10px;
      margin-bottom: 140px;
      white-space: nowrap;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      right: -12px;
      bottom: 20px;
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 14px solid white;
    }

    /* ================================
       Weather Widget
       ================================ */

    .weather-widget {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 20px 24px;
      max-width: 300px;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .weather-loading,
    .weather-error {
      font-size: 0.9rem;
      text-align: center;
      padding: 16px 0;
      color: rgba(255, 255, 255, 0.8);
    }

    .weather-error {
      color: #ff9b9b;
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .weather-location {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: white;
    }

    .weather-controls {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
    }

    .weather-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.75rem;
      cursor: pointer;
      color: white;
      transition: background 0.2s ease;
      white-space: nowrap;
    }

    .weather-btn:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .weather-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .unit-toggle {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    .unit-option {
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      background: transparent;
      transition: background 0.2s ease, color 0.2s ease;
      user-select: none;
    }

    .unit-option.unit-active {
      background: rgba(255, 255, 255, 0.3);
      color: white;
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .weather-icon {
      font-size: 2.5rem;
    }

    .weather-temp {
      font-size: 2.2rem;
      font-weight: 700;
      color: white;
    }

    .weather-condition {
      margin: 0 0 10px 0;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.85);
    }

    .weather-details {
      display: flex;
      gap: 16px;
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 4px;
    }

    .weather-divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      margin: 14px 0;
    }

    .weather-forecast-header {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .weather-forecast {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .forecast-day {
      display: grid;
      grid-template-columns: 40px 28px 1fr 1fr;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
    }

    .forecast-label {
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
    }

    .forecast-emoji {
      font-size: 1.1rem;
    }

    .forecast-high {
      color: white;
      font-weight: 600;
      text-align: right;
    }

    .forecast-low {
      color: rgba(255, 255, 255, 0.6);
      text-align: right;
    }

    .weather-updated {
      margin: 12px 0 0 0;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="page-wrapper">
    <div class="container">
    <img src="Photos/Winkeler_Kirsten.jpg" alt="Profile photo" class="profile-photo" onclick="toggleRoni()">
    <h1>Hello World!</h1>
    <p class="welcome-msg">Welcome to my page! Thanks for stopping by.</p>
    <a href="mailto:contact@example.com" class="contact-btn" onclick="launchConfetti(event)">Contact me</a>
  </div>

  <!-- Weather Widget -->
  <div id="weather-widget" class="weather-widget">

    <!-- Loading State -->
    <div id="weather-loading" class="weather-loading">
      Loading weather...
    </div>

    <!-- Error State -->
    <div id="weather-error" class="weather-error" style="display:none;">
      ⚠️ Weather unavailable. Please try again later.
    </div>

    <!-- Weather Content -->
    <div id="weather-content" class="weather-content" style="display:none;">

      <!-- Header: Location + Buttons -->
      <div class="weather-header">
        <h3 id="weather-location" class="weather-location">--</h3>
        <div class="weather-controls">
          <button id="weather-locate-btn" class="weather-btn">
            📍 Current Location
          </button>
          <div class="unit-toggle" id="weather-unit-btn">
            <span class="unit-option unit-active" data-unit="fahrenheit">°F</span>
            <span class="unit-option" data-unit="celsius">°C</span>
          </div>
        </div>
      </div>

      <!-- Current Conditions -->
      <div class="weather-main">
        <span id="weather-icon" class="weather-icon"></span>
        <span id="weather-temp" class="weather-temp"></span>
      </div>
      <p id="weather-condition" class="weather-condition"></p>
      <div class="weather-details">
        <span id="weather-humidity">💧 --%</span>
        <span id="weather-wind">💨 -- mph</span>
      </div>

      <!-- Divider -->
      <hr class="weather-divider" />

      <!-- 5-Day Forecast -->
      <div class="weather-forecast-header">5-Day Forecast</div>
      <div id="weather-forecast" class="weather-forecast"></div>

      <!-- Last Updated Timestamp -->
      <p id="weather-updated" class="weather-updated"></p>

    </div>
  </div>
  </div>

  <div class="roni-popup" id="roni-popup">
    <div class="speech-bubble">BORK! BORK!</div>
    <img src="Photos/roni.jpeg" alt="Roni">
  </div>
  <canvas id="confetti-canvas"></canvas>
  <script>
    function toggleRoni() {
      const popup = document.getElementById('roni-popup');
      if (popup.classList.contains('visible')) {
        popup.classList.remove('visible');
      } else {
        popup.classList.add('visible');
        popup.animate([
          { right: '-500px' },
          { right: '20px', offset: 0.4 },
          { right: '50px', offset: 0.5 },
          { right: '20px', offset: 0.6 },
          { right: '40px', offset: 0.7 },
          { right: '20px', offset: 0.8 },
          { right: '30px', offset: 0.9 },
          { right: '20px' }
        ], { duration: 1200, easing: 'ease' });
      }
    }

    const canvas = document.getElementById('confetti-canvas');

    // Generate star field
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
      star.style.setProperty('--delay', (Math.random() * 5) + 's');
      starsContainer.appendChild(star);
    }

    const ctx = canvas.getContext('2d');
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
    let particles = [];
    let animating = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const colors = ['#c97070','#c9a070','#c9c970','#70a870','#7090c9','#9070c9','#e8a0b8','#70c9c0'];

    function launchConfetti(e) {
      const rect = e.target.getBoundingClientRect();
      const originX = rect.left + rect.width / 2;
      const originY = rect.top + rect.height / 2;

      for (let i = 0; i < 120; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 8;
        particles.push({
          x: originX,
          y: originY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 4,
          size: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 12,
          life: 1,
          decay: 0.008 + Math.random() * 0.008
        });
      }
      if (!animating) {
        animating = true;
        animateConfetti();
      }
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.vx *= 0.99;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      });

      particles = particles.filter(p => p.life > 0);

      if (particles.length > 0) {
        requestAnimationFrame(animateConfetti);
      } else {
        animating = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
  </script>
  <script src="weather.js"></script>
</body>
</html>
