<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a6fe8, #12b886);
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      text-align: center;
      color: white;
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 1.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .contact-btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #1a6fe8;
      background: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0, 0, 0, 0.3);
    }

    .contact-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Photos/Casual Headshot.png" alt="Profile photo" class="profile-photo">
    <h1>Hello, World!</h1>
    <a href="mailto:contact@example.com" class="contact-btn">Contact Us</a>
  </div>
</body>
</html>
